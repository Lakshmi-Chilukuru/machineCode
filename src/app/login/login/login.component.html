<div class="login-page">
    <div class="login-container">
        <h1>LOGIN</h1>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="input-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" placeholder="your@email.com" value="string212@gmail.com" formControlName="EmailId"> 
        </div>
        
        <div class="input-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" value="string32123" formControlName="Password">
        </div>
        
        <button type="submit">SIGN IN</button>
        </form>
        <div class="divider">OR</div>
        
        <div class="social-login">
            <div class="social-btn">G</div>
            <div class="social-btn">F</div>
            <div class="social-btn">X</div>
        </div>
        
        <div class="footer">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</div>
